<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tereza</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: #1f1714;
        background: #f7f7fb;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }

      body {
        overflow-x: hidden;
      }

      .hero {
        position: relative;
        display: grid;
        height: 100vh;
        width: 100vw;
        isolation: isolate;
        overflow: hidden;
      }

      .hero__image {
        position: absolute;
        inset: 0;
        z-index: -2;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
      }

      .hero__mark {
        align-self: end;
        justify-self: center;
        margin-bottom: clamp(18px, 4vw, 34px);
        font-size: clamp(0.8rem, 1.6vw, 1rem);
        font-weight: 700;
        letter-spacing: 0.08em;
        color: #b71b0b;
      }

      .hero::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        background: linear-gradient(
          90deg,
          rgba(247, 247, 251, 0.88) 0%,
          rgba(247, 247, 251, 0.52) 35%,
          rgba(247, 247, 251, 0.08) 64%,
          rgba(247, 247, 251, 0) 100%
        );
        pointer-events: none;
      }

      .hero__content {
        align-self: end;
        width: min(92vw, 620px);
        padding: clamp(24px, 6vw, 72px);
        padding-bottom: clamp(36px, 8vw, 96px);
      }

      .eyebrow {
        margin: 0 0 14px;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
        color: #b71b0b;
      }

      h1 {
        margin: 0;
        font-size: clamp(3rem, 10vw, 7.5rem);
        line-height: 0.92;
        letter-spacing: 0;
      }

      .hero__text {
        max-width: 34rem;
        margin: 22px 0 0;
        font-size: clamp(1rem, 2vw, 1.22rem);
        line-height: 1.55;
        color: #433935;
      }

      .hero__actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 30px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 22px;
        border: 1px solid #c21d0b;
        border-radius: 6px;
        font-weight: 700;
        color: #ffffff;
        background: #c21d0b;
        text-decoration: none;
        box-shadow: 0 14px 36px rgba(194, 29, 11, 0.22);
      }

      .button--secondary {
        color: #1f1714;
        background: rgba(255, 255, 255, 0.68);
        border-color: rgba(31, 23, 20, 0.18);
        box-shadow: none;
        backdrop-filter: blur(8px);
      }

      @media (max-width: 720px) {
        .hero {
          height: 100svh;
        }

        .hero::after {
          background: linear-gradient(
            180deg,
            rgba(247, 247, 251, 0.14) 0%,
            rgba(247, 247, 251, 0.4) 46%,
            rgba(247, 247, 251, 0.92) 100%
          );
        }

        .hero__image {
          object-position: center top;
        }

        .hero__content {
          width: 100%;
        }

        .button {
          flex: 1 1 180px;
        }
      }
    </style>
  </head>
  <body>
    <main class="hero" aria-label="Tereza landing page">
      <img
        class="hero__image"
        src="heart-hero.png"
        alt="A red heart centered on a pale background"
      />
      <div class="hero__mark" aria-label="T and V">T&amp;V</div>
    </main>
  </body>
</html>
