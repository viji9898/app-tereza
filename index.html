<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>T&amp;V</title>
    <meta
      name="description"
      content="Tereza Dos Santos Costa Spirit Reel 2024 playing full-screen."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="T&V" />
    <meta
      property="og:description"
      content="Tereza Dos Santos Costa Spirit Reel 2024 playing full-screen."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="T&V" />
    <meta
      name="twitter:description"
      content="Tereza Dos Santos Costa Spirit Reel 2024 playing full-screen."
    />
    <style>
      :root {
        color-scheme: dark;
        background: #000000;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        background: #000000;
        overflow-x: hidden;
      }

      .hero {
        position: relative;
        height: 100%;
        width: 100vw;
        overflow: hidden;
        isolation: isolate;
      }

      .hero__video {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
      }

      .hero__overlay {
        position: absolute;
        inset: 0;
        z-index: 1;
        display: grid;
        grid-template-rows: minmax(28px, 12vh) auto 1fr auto minmax(36px, 14vh);
        justify-items: center;
        padding: clamp(18px, 4vw, 54px);
        color: #fff9f0;
        font-family:
          Didot,
          "Bodoni 72",
          "Bodoni MT",
          "Times New Roman",
          serif;
        text-align: center;
        text-shadow: 0 2px 16px rgba(0, 0, 0, 0.44);
        pointer-events: none;
      }

      .hero__name {
        grid-row: 2;
      }

      .hero__name span {
        display: block;
        font-weight: 400;
        letter-spacing: 0.04em;
        line-height: 0.82;
      }

      .hero__name-main {
        font-size: clamp(4.5rem, 14.2vw, 12.4rem);
      }

      .hero__name-sub {
        font-size: clamp(2.4rem, 7.1vw, 6.1rem);
      }

      .hero__socials {
        grid-row: 4;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: clamp(18px, 2.8vw, 34px);
        pointer-events: auto;
      }

      .hero__circle-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: clamp(44px, 5vw, 64px);
        padding: 0 clamp(18px, 2.6vw, 30px);
        border: 1px solid rgba(255, 249, 240, 0.82);
        border-radius: 999px;
        color: #fff9f0;
        font-family:
          Optima,
          Candara,
          "Noto Sans",
          sans-serif;
        font-size: clamp(0.82rem, 1.3vw, 1rem);
        font-weight: 700;
        letter-spacing: 0.08em;
        text-decoration: none;
        text-transform: uppercase;
        background: rgba(0, 0, 0, 0.16);
        backdrop-filter: blur(10px);
        box-shadow: 0 2px 16px rgba(0, 0, 0, 0.3);
      }

      .hero__circle-link:hover,
      .hero__circle-link:focus-visible {
        background: rgba(255, 249, 240, 0.16);
      }

      @media (max-width: 720px) {
        .hero {
          height: 100svh;
        }

        .hero__overlay {
          grid-template-rows: minmax(18px, 10vh) auto 1fr auto minmax(28px, 12vh);
          padding-inline: 14px;
        }

        .hero__name span {
          letter-spacing: 0.02em;
        }
      }
    </style>
  </head>
  <body>
    <main class="hero" aria-label="Tereza Dos Santos Costa Spirit Reel 2024">
      <video
        class="hero__video"
        autoplay
        muted
        loop
        playsinline
        preload="auto"
        aria-label="Tereza Dos Santos Costa Spirit Reel 2024"
      >
        <source
          src="https://customer-apps-techhq.s3.eu-west-2.amazonaws.com/app-tereza/tereza_dos_santos_costa_spirit_reel_2024+(1080p).mp4"
          type="video/mp4"
        />
      </video>
      <div class="hero__overlay">
        <h1 class="hero__name">
          <span class="hero__name-main">TEREZA</span>
          <span class="hero__name-sub">DOS SANTOS</span>
        </h1>
        <div class="hero__socials" aria-label="Social links">
          <a
            class="hero__circle-link"
            href="https://chat.whatsapp.com/H1KtTJdTBh16hhf4cAfDSu"
            target="_blank"
            rel="noopener noreferrer"
          >
            Join The Inner Circle
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
