<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>T&amp;V Content</title>
    <meta
      name="description"
      content="Tereza video content playlist with piano and Spirit reels."
    />
    <style>
      :root {
        color-scheme: light;
        font-family:
          Georgia,
          "Times New Roman",
          serif;
        color: #241916;
        background: #f7f1e8;
        --ink: #241916;
        --muted: #745f56;
        --paper: #fffaf2;
        --line: rgba(36, 25, 22, 0.14);
        --red: #bc1d0c;
        --red-dark: #781207;
        --shadow: 0 26px 80px rgba(54, 31, 20, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        overflow-x: hidden;
      }

      button {
        font: inherit;
      }

      .page {
        min-height: 100vh;
        padding: clamp(18px, 4vw, 48px);
        background:
          radial-gradient(circle at 10% 8%, rgba(188, 29, 12, 0.14), transparent 34vw),
          linear-gradient(135deg, #fff9ef 0%, #f4e2d1 48%, #f7f1e8 100%);
      }

      .shell {
        width: min(1180px, 100%);
        margin: 0 auto;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: clamp(22px, 4vw, 44px);
      }

      .brand {
        font-size: 0.86rem;
        font-weight: 700;
        letter-spacing: 0;
        color: var(--red);
        text-decoration: none;
      }

      .section-label {
        margin: 0;
        color: var(--muted);
        font-family:
          Optima,
          Candara,
          "Noto Sans",
          sans-serif;
        font-size: 0.76rem;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .intro {
        display: grid;
        grid-template-columns: minmax(0, 0.9fr) minmax(260px, 0.5fr);
        gap: clamp(22px, 5vw, 72px);
        align-items: end;
        margin-bottom: clamp(22px, 4vw, 42px);
      }

      h1 {
        max-width: 760px;
        margin: 0;
        font-size: clamp(2.7rem, 8vw, 6.8rem);
        line-height: 0.9;
        letter-spacing: 0;
      }

      .intro__copy {
        margin: 0;
        color: var(--muted);
        font-family:
          Optima,
          Candara,
          "Noto Sans",
          sans-serif;
        font-size: clamp(1rem, 1.9vw, 1.2rem);
        line-height: 1.55;
      }

      .player {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(260px, 340px);
        gap: clamp(16px, 3vw, 28px);
        align-items: stretch;
      }

      .stage {
        overflow: hidden;
        border: 1px solid rgba(36, 25, 22, 0.1);
        border-radius: 8px;
        background: #120c0a;
        box-shadow: var(--shadow);
      }

      video {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #120c0a;
      }

      .controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 16px;
        color: #fff7ee;
        background: #1b100d;
      }

      .track-title {
        min-width: 0;
      }

      .track-title p {
        margin: 0;
        color: rgba(255, 247, 238, 0.68);
        font-family:
          Optima,
          Candara,
          "Noto Sans",
          sans-serif;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .track-title h2 {
        margin: 4px 0 0;
        overflow: hidden;
        font-size: clamp(1.25rem, 2.5vw, 1.7rem);
        line-height: 1.05;
        letter-spacing: 0;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .transport {
        display: flex;
        flex: 0 0 auto;
        gap: 8px;
      }

      .transport button,
      .playlist button {
        cursor: pointer;
      }

      .icon-button {
        display: grid;
        width: 44px;
        height: 44px;
        place-items: center;
        border: 1px solid rgba(255, 247, 238, 0.22);
        border-radius: 6px;
        color: #fff7ee;
        background: rgba(255, 255, 255, 0.08);
      }

      .icon-button:hover,
      .icon-button:focus-visible {
        border-color: rgba(255, 247, 238, 0.52);
        background: rgba(255, 255, 255, 0.14);
      }

      .playlist {
        display: flex;
        flex-direction: column;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 250, 242, 0.74);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .playlist__header {
        padding: 18px 18px 12px;
        border-bottom: 1px solid var(--line);
      }

      .playlist__header h2 {
        margin: 4px 0 0;
        font-size: 1.45rem;
        letter-spacing: 0;
      }

      .playlist__items {
        display: grid;
        gap: 1px;
        padding: 8px;
      }

      .playlist__item {
        display: grid;
        grid-template-columns: 34px minmax(0, 1fr);
        gap: 12px;
        align-items: center;
        width: 100%;
        padding: 13px 12px;
        border: 0;
        border-radius: 6px;
        color: var(--ink);
        background: transparent;
        text-align: left;
      }

      .playlist__item:hover,
      .playlist__item:focus-visible {
        background: rgba(188, 29, 12, 0.08);
      }

      .playlist__item[aria-current="true"] {
        color: #fffaf2;
        background: var(--red);
      }

      .playlist__number {
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border: 1px solid currentColor;
        border-radius: 50%;
        font-family:
          Optima,
          Candara,
          "Noto Sans",
          sans-serif;
        font-size: 0.78rem;
        font-weight: 700;
      }

      .playlist__name {
        display: block;
        overflow-wrap: anywhere;
        font-size: 1.05rem;
        line-height: 1.1;
      }

      .playlist__meta {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-family:
          Optima,
          Candara,
          "Noto Sans",
          sans-serif;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .playlist__item[aria-current="true"] .playlist__meta {
        color: rgba(255, 250, 242, 0.74);
      }

      @media (max-width: 880px) {
        .intro,
        .player {
          grid-template-columns: 1fr;
        }

        .intro__copy {
          max-width: 640px;
        }
      }

      @media (max-width: 560px) {
        .page {
          padding: 16px;
        }

        .topbar {
          margin-bottom: 28px;
        }

        .controls {
          display: grid;
          grid-template-columns: 1fr;
        }

        .transport {
          justify-content: stretch;
        }

        .icon-button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="shell">
        <nav class="topbar" aria-label="Primary navigation">
          <a class="brand" href="/">T&amp;V</a>
          <p class="section-label">Content</p>
        </nav>

        <section class="intro" aria-labelledby="page-title">
          <h1 id="page-title">Tereza reels</h1>
          <p class="intro__copy">
            A compact player for piano, Spirit, and performance reels.
          </p>
        </section>

        <section class="player" aria-label="Video playlist">
          <div class="stage">
            <video
              id="video-player"
              controls
              playsinline
              preload="metadata"
              src="https://customer-apps-techhq.s3.eu-west-2.amazonaws.com/app-tereza/tereza_piano_reel+(1080p).mp4"
            ></video>
            <div class="controls">
              <div class="track-title" aria-live="polite">
                <p>Now playing</p>
                <h2 id="current-title">Tereza Piano Reel</h2>
              </div>
              <div class="transport" aria-label="Playlist controls">
                <button class="icon-button" type="button" id="previous-track" aria-label="Previous video">
                  &lt;
                </button>
                <button class="icon-button" type="button" id="next-track" aria-label="Next video">
                  &gt;
                </button>
              </div>
            </div>
          </div>

          <aside class="playlist" aria-label="Playlist">
            <div class="playlist__header">
              <p class="section-label">Playlist</p>
              <h2>Video reels</h2>
            </div>
            <div class="playlist__items" id="playlist-items"></div>
          </aside>
        </section>
      </div>
    </main>

    <script>
      const tracks = [
        {
          title: "Tereza Piano Reel",
          meta: "Piano reel",
          src: "https://customer-apps-techhq.s3.eu-west-2.amazonaws.com/app-tereza/tereza_piano_reel+(1080p).mp4",
        },
        {
          title: "Spirit Reel Edit",
          meta: "Spirit reel",
          src: "https://customer-apps-techhq.s3.eu-west-2.amazonaws.com/app-tereza/Spirit+Reel+Edit_JZ+NEW_123024.mp4",
        },
        {
          title: "Tereza Dos Santos Costa Spirit Reel 2024",
          meta: "Performance reel",
          src: "https://customer-apps-techhq.s3.eu-west-2.amazonaws.com/app-tereza/tereza_dos_santos_costa_spirit_reel_2024+(1080p).mp4",
        },
        {
          title: "Skywalkers June Trailer",
          meta: "Trailer",
          src: "https://customer-apps-techhq.s3.eu-west-2.amazonaws.com/app-tereza/skywalkers_june_trailer_jz_cut+(1080p).mp4",
        },
        {
          title: "Crush Trailer",
          meta: "Trailer",
          src: "https://customer-apps-techhq.s3.eu-west-2.amazonaws.com/app-tereza/crush_trailer_jz_edit+(1080p).mp4",
        },
      ];

      const player = document.querySelector("#video-player");
      const currentTitle = document.querySelector("#current-title");
      const playlistItems = document.querySelector("#playlist-items");
      const previousTrack = document.querySelector("#previous-track");
      const nextTrack = document.querySelector("#next-track");
      let activeTrack = 0;

      function renderPlaylist() {
        playlistItems.innerHTML = "";

        tracks.forEach((track, index) => {
          const button = document.createElement("button");
          button.className = "playlist__item";
          button.type = "button";
          button.setAttribute("aria-current", String(index === activeTrack));
          button.innerHTML = `
            <span class="playlist__number">${String(index + 1).padStart(2, "0")}</span>
            <span>
              <span class="playlist__name">${track.title}</span>
              <span class="playlist__meta">${track.meta}</span>
            </span>
          `;
          button.addEventListener("click", () => selectTrack(index, true));
          playlistItems.append(button);
        });
      }

      function selectTrack(index, shouldPlay = false) {
        activeTrack = (index + tracks.length) % tracks.length;
        const track = tracks[activeTrack];

        player.src = track.src;
        currentTitle.textContent = track.title;
        renderPlaylist();

        if (shouldPlay) {
          player.play().catch(() => {});
        }
      }

      previousTrack.addEventListener("click", () => selectTrack(activeTrack - 1, true));
      nextTrack.addEventListener("click", () => selectTrack(activeTrack + 1, true));
      player.addEventListener("ended", () => selectTrack(activeTrack + 1, true));

      renderPlaylist();
    </script>
  </body>
</html>
